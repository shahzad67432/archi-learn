
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:'DM Sans',sans-serif}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:16px;
}
.card{
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:16px;
  padding:20px 16px 14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.mood-label{
  font-family:'Syne',sans-serif;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--color-text-secondary);
}
.mood-desc{
  font-size:10px;
  color:var(--color-text-tertiary);
  text-align:center;
  line-height:1.4;
}

/* ── IDLE breathing ── */
@keyframes breathe{
  0%,100%{transform:scaleY(1) scaleX(1)}
  50%{transform:scaleY(1.04) scaleX(0.97)}
}
@keyframes blink{
  0%,92%,100%{transform:scaleY(1)}
  94%,98%{transform:scaleY(0.08)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}
@keyframes bob{
  0%,100%{transform:translateY(0) rotate(0deg)}
  25%{transform:translateY(-3px) rotate(1.5deg)}
  75%{transform:translateY(-1px) rotate(-1deg)}
}

/* ── CHEER ── */
@keyframes jump{
  0%,100%{transform:translateY(0) scaleX(1) scaleY(1)}
  20%{transform:translateY(-18px) scaleX(0.95) scaleY(1.05)}
  40%{transform:translateY(-22px) scaleX(0.92) scaleY(1.08)}
  60%{transform:translateY(-14px) scaleX(0.96) scaleY(1.04)}
  80%{transform:translateY(-4px) scaleX(1.02) scaleY(0.98)}
}
@keyframes squish-land{
  0%,60%,100%{transform:scaleX(1) scaleY(1)}
  80%{transform:scaleX(1.18) scaleY(0.82)}
  90%{transform:scaleX(0.95) scaleY(1.05)}
}
@keyframes arm-left-cheer{
  0%,100%{transform:rotate(-20deg)}
  50%{transform:rotate(-60deg) translateY(-4px)}
}
@keyframes arm-right-cheer{
  0%,100%{transform:rotate(20deg)}
  50%{transform:rotate(60deg) translateY(-4px)}
}
@keyframes star-burst{
  0%{transform:scale(0) rotate(0deg);opacity:1}
  60%{opacity:1}
  100%{transform:scale(1.4) rotate(180deg);opacity:0}
}

/* ── THINKING ── */
@keyframes think-tilt{
  0%,100%{transform:rotate(0deg)}
  30%,70%{transform:rotate(-8deg)}
}
@keyframes dot-appear{
  0%,60%{opacity:0;transform:translateY(4px)}
  70%,90%{opacity:1;transform:translateY(0)}
  100%{opacity:0}
}

/* ── SAD ── */
@keyframes droop{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(3px)}
}
@keyframes tear-fall{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(14px);opacity:0}
}

/* ── POINTING ── */
@keyframes point-bounce{
  0%,100%{transform:rotate(0deg) translateX(0)}
  50%{transform:rotate(-5deg) translateX(3px)}
}
@keyframes arm-point{
  0%,100%{transform:rotate(15deg)}
  50%{transform:rotate(8deg) translateX(3px)}
}

/* ── SURPRISED ── */
@keyframes startle{
  0%{transform:scale(1)}
  15%{transform:scale(1.12) translateY(-6px)}
  30%{transform:scale(0.95) translateY(2px)}
  45%{transform:scale(1.05) translateY(-2px)}
  100%{transform:scale(1) translateY(0)}
}
@keyframes shock-line{
  0%,100%{opacity:0;transform:scale(0)}
  30%,70%{opacity:1;transform:scale(1)}
}

/* ── CELEBRATING ── */
@keyframes spin-once{
  0%{transform:rotate(0deg) scale(1)}
  25%{transform:rotate(90deg) scale(1.1)}
  50%{transform:rotate(180deg) scale(1)}
  75%{transform:rotate(270deg) scale(1.1)}
  100%{transform:rotate(360deg) scale(1)}
}
@keyframes confetti-1{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(-22px,-28px) rotate(-120deg);opacity:0}
}
@keyframes confetti-2{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(20px,-32px) rotate(140deg);opacity:0}
}
@keyframes confetti-3{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(26px,-18px) rotate(80deg);opacity:0}
}
@keyframes confetti-4{
  0%{transform:translate(0,0) rotate(0deg);opacity:1}
  100%{transform:translate(-18px,-24px) rotate(-90deg);opacity:0}
}

/* ── SHADOW ── */
@keyframes shadow-pulse{
  0%,100%{transform:scaleX(1);opacity:0.18}
  50%{transform:scaleX(0.8);opacity:0.1}
}
</style>

<div class="grid">
