  <path d="M153,146 Q148,138 146,130" fill="none" stroke="#1A1A1A" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M163,146 Q168,138 170,130" fill="none" stroke="#FF6B2B" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M163,146 Q168,138 170,130" fill="none" stroke="#1A1A1A" stroke-width="0.7" stroke-linecap="round"/>

