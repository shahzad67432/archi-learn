  <circle cx="94" cy="56" r="9" fill="#FF6B2B" opacity="0.35"/>
  <circle cx="106" cy="56" r="9" fill="#FF6B2B" opacity="0.35"/>
  <circle cx="100" cy="52" r="7" fill="#FF6B2B" opacity="0.55"/>
  <circle cx="96" cy="60" r="6" fill="#FF6B2B" opacity="0.75"/>
