<svg width="100%" viewBox="0 0 680 386" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="text-gaps" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="680" height="386" fill="white"/>
      <rect x="55" y="240" width="50" height="10" fill="black" rx="2"/>
      <rect x="60" y="252" width="40" height="10" fill="black" rx="2"/>
      <rect x="112" y="161" width="54" height="10" fill="black" rx="2"/>
      <rect x="116" y="173" width="46" height="10" fill="black" rx="2"/>
      <rect x="398" y="136" width="62" height="10" fill="black" rx="2"/>
      <rect x="402" y="148" width="54" height="10" fill="black" rx="2"/>
      <rect x="414" y="233" width="52" height="10" fill="black" rx="2"/>
      <rect x="416" y="245" width="48" height="10" fill="black" rx="2"/>
    </mask>
  </defs>

  <title>Concept 02 — Tree of Knowledge</title>
  <desc>Isometric tree of knowledge with branching growth stages, annotation leader lines, in Archi.learn orange, cream and near-black palette.</desc>

  <!-- BASE PLATFORM -->
  <polygon points="230,290 340,228 450,290 340,352" fill="#EDE3D5" stroke="#1A1A1A" stroke-width="1.2"/>
  <polygon points="340,352 450,290 450,314 340,376" fill="#C4B49E" stroke="#1A1A1A" stroke-width="1.2"/>
  <polygon points="230,290 340,352 340,376 230,314" fill="#D4C6B2" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- ROOTS -->
  <path d="M335,290 Q310,298 298,294" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M340,294 Q342,312 336,318" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M345,290 Q370,298 382,294" fill="none" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M325,288 Q304,282 294,278" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M355,288 Q376,282 386,278" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- TRUNK (isometric column) -->
  <polygon points="330,176 340,168 350,176 340,184" fill="#EDE3D5" stroke="#1A1A1A" stroke-width="1.2"/>
  <polygon points="340,184 350,176 350,290 340,298" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.2"/>
  <polygon points="330,176 340,184 340,298 330,290" fill="#2A2A2A" stroke="#1A1A1A" stroke-width="1.2"/>

  <!-- TRUNK TEXTURE LINES -->
  <line x1="335" y1="210" x2="345" y2="210" stroke="#EDE3D5" stroke-width="0.6" opacity="0.15"/>
  <line x1="335" y1="230" x2="345" y2="230" stroke="#EDE3D5" stroke-width="0.6" opacity="0.15"/>
  <line x1="335" y1="250" x2="345" y2="250" stroke="#EDE3D5" stroke-width="0.6" opacity="0.15"/>
  <line x1="335" y1="270" x2="345" y2="270" stroke="#EDE3D5" stroke-width="0.6" opacity="0.15"/>

  <!-- BRANCH 1 — SPROUT (left, lower) -->
  <polygon points="336,264 344,260 310,244 302,248" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="0.8"/>
  <circle cx="285" cy="236" r="18" fill="#FF6B2B" opacity="0.15"/>
  <circle cx="280" cy="228" r="11" fill="#FF6B2B" opacity="0.5"/>
  <circle cx="290" cy="232" r="9" fill="#FF6B2B" opacity="0.7"/>
  <circle cx="277" cy="238" r="7" fill="#FF6B2B" opacity="0.9"/>
  <circle cx="295" cy="228" r="5" fill="#FF6B2B"/>

  <!-- BRANCH 2 — GROW (right, lower) -->
  <polygon points="344,250 336,254 374,238 382,234" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="0.8"/>
  <circle cx="398" cy="228" r="18" fill="#FF6B2B" opacity="0.15"/>
  <circle cx="402" cy="220" r="11" fill="#FF6B2B" opacity="0.5"/>
  <circle cx="394" cy="224" r="9" fill="#FF6B2B" opacity="0.7"/>
  <circle cx="406" cy="230" r="7" fill="#FF6B2B" opacity="0.9"/>
  <circle cx="390" cy="220" r="5" fill="#FF6B2B"/>

  <!-- BRANCH 3 — BLOOM (left, upper) -->
  <polygon points="337,212 343,208 316,194 310,198" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="0.8"/>
  <circle cx="296" cy="188" r="16" fill="#FF6B2B" opacity="0.15"/>
  <circle cx="292" cy="182" r="10" fill="#FF6B2B" opacity="0.5"/>
  <circle cx="300" cy="184" r="8" fill="#FF6B2B" opacity="0.7"/>
  <circle cx="289" cy="190" r="6" fill="#FF6B2B" opacity="0.9"/>

  <!-- BRANCH 4 — FLOURISH (right, upper) -->
  <polygon points="343,196 337,200 366,184 372,180" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="0.8"/>
  <circle cx="388" cy="174" r="16" fill="#FF6B2B" opacity="0.15"/>
  <circle cx="384" cy="168" r="10" fill="#FF6B2B" opacity="0.5"/>
  <circle cx="392" cy="170" r="8" fill="#FF6B2B" opacity="0.7"/>
  <circle cx="382" cy="176" r="6" fill="#FF6B2B" opacity="0.9"/>

  <!-- TOP CANOPY — FLOURISH crown -->
  <circle cx="340" cy="152" r="20" fill="#FF6B2B" opacity="0.12"/>
  <circle cx="332" cy="144" r="13" fill="#FF6B2B" opacity="0.4"/>
  <circle cx="348" cy="144" r="13" fill="#FF6B2B" opacity="0.4"/>
  <circle cx="340" cy="140" r="11" fill="#FF6B2B" opacity="0.6"/>
  <circle cx="335" cy="148" r="9" fill="#FF6B2B" opacity="0.8"/>
  <circle cx="345" cy="148" r="9" fill="#FF6B2B" opacity="0.8"/>
  <circle cx="340" cy="146" r="6" fill="#FF6B2B"/>

  <!-- FLOATING LEAVES / SPARKLES -->
  <circle cx="260" cy="200" r="3" fill="#FF6B2B" opacity="0.4"/>
  <circle cx="415" cy="190" r="2.5" fill="#FF6B2B" opacity="0.5"/>
  <circle cx="310" cy="170" r="2" fill="#FF6B2B" opacity="0.6"/>
  <circle cx="370" cy="160" r="3" fill="#FF6B2B" opacity="0.3"/>
  <circle cx="250" cy="260" r="2" fill="#FF6B2B" opacity="0.5"/>

  <!-- ANNOTATION: ROOT -->
  <line x1="280" y1="283" x2="165" y2="252" stroke="#C4B49E" stroke-width="0.7" stroke-dasharray="3 3" mask="url(#text-gaps)"/>
  <circle cx="280" cy="283" r="2.5" fill="#FF6B2B"/>
  <rect x="50" y="234" width="60" height="28" rx="3" fill="#1A1A1A"/>
  <text x="80" y="245" fill="#999" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="9">STAGE 1</text>
  <text x="80" y="257" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600">Root</text>

  <!-- ANNOTATION: SPROUT -->
  <line x1="285" y1="228" x2="170" y2="172" stroke="#C4B49E" stroke-width="0.7" stroke-dasharray="3 3" mask="url(#text-gaps)"/>
  <circle cx="285" cy="228" r="2.5" fill="#FF6B2B"/>
  <rect x="106" y="155" width="66" height="28" rx="3" fill="#FF6B2B"/>
  <text x="139" y="166" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="9">STAGE 2</text>
  <text x="139" y="178" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600">Sprout</text>

  <!-- ANNOTATION: BLOOM -->
  <line x1="400" y1="224" x2="445" y2="148" stroke="#C4B49E" stroke-width="0.7" stroke-dasharray="3 3" mask="url(#text-gaps)"/>
  <circle cx="400" cy="224" r="2.5" fill="#FF6B2B"/>
  <rect x="388" y="130" width="82" height="28" rx="3" fill="#FF6B2B"/>
  <text x="429" y="141" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="9">STAGE 3</text>
  <text x="429" y="153" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600">Bloom</text>

  <!-- ANNOTATION: FLOURISH -->
  <line x1="385" y1="172" x2="456" y2="244" stroke="#C4B49E" stroke-width="0.7" stroke-dasharray="3 3" mask="url(#text-gaps)"/>
  <circle cx="385" cy="172" r="2.5" fill="#FF6B2B"/>
  <rect x="404" y="227" width="72" height="28" rx="3" fill="#1A1A1A"/>
  <text x="440" y="238" fill="#999" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="9">STAGE 4</text>
  <text x="440" y="250" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600">Flourish</text>

  <!-- XP BADGE -->
  <rect x="200" y="320" width="62" height="22" rx="11" fill="#FF6B2B"/>
  <text x="231" y="335" fill="#fff" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="10" font-weight="600">+ 100 XP</text>

  <!-- BLUEPRINT CORNER MARKS -->
  <path d="M56,80 L56,68 L68,68" fill="none" stroke="#C4B49E" stroke-width="0.8"/>
  <path d="M624,310 L624,322 L612,322" fill="none" stroke="#C4B49E" stroke-width="0.8"/>
  <rect x="600" y="80" width="10" height="10" fill="none" stroke="#C4B49E" stroke-width="0.6" stroke-dasharray="2 2"/>

  <!-- LABEL -->
  <text x="56" y="360" fill="#C4B49E" font-family="'DM Sans', sans-serif" font-size="9">02 — TREE OF KNOWLEDGE</text>
</svg>
