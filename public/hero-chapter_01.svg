  <path d="M112,159 Q114,154 113,150" fill="none" stroke="#16A34A" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <path d="M95,158 Q93,155 94,152" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
  <path d="M115,160 Q117,156 116,153" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
  <path d="M79,158 Q77,154 78,150" fill="none" stroke="#16A34A" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
  <path d="M121,158 Q123,154 122,151" fill="none" stroke="#16A34A" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>

