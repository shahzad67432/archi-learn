  <ellipse cx="68" cy="169" rx="1.8" ry="1.2" fill="#B8B0A8" stroke="#A8A29E" stroke-width="0.3"/>
  <ellipse cx="126" cy="167" rx="1.3" ry="0.8" fill="#C4B49E" opacity="0.5"/>

